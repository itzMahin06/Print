<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheet Printer & Exporter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'SolaimanLipi', sans-serif; }
        
        /* Print Styles */
        @media print {
            body * { visibility: hidden; }
            #printable-area, #printable-area * { visibility: visible; }
            #printable-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }

        /* Custom Scrollbar for Table */
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <div class="max-w-6xl mx-auto p-4 py-10">
        <div class="text-center mb-10 no-print">
            <h1 class="text-3xl md:text-4xl font-bold text-blue-600 mb-2">
                <i class="fa-solid fa-file-excel mr-2"></i>Smart Sheet Exporter
            </h1>
            <p class="text-gray-500">যেকোনো পাবলিক গুগল শিট প্রিন্ট করুন অথবা ছবি আকারে (Zip) সেভ করুন</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-8 no-print">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-grow">
                    <label class="block text-sm font-medium text-gray-700 mb-1">গুগল শিটের পাবলিক লিংক দিন</label>
                    <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/..../edit" 
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                </div>
                <div class="flex items-end">
                    <button onclick="loadSheet()" id="loadBtn" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-medium transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-down"></i> শিট লোড করুন
                    </button>
                </div>
            </div>
            <p class="text-xs text-red-500 mt-2 hidden" id="errorMsg"><i class="fa-solid fa-circle-exclamation"></i> সঠিক লিংক দিন অথবা শিটটি 'Public' করা আছে কিনা নিশ্চিত করুন।</p>
        </div>

        <div id="actionButtons" class="hidden flex flex-wrap justify-end gap-3 mb-4 no-print">
            <button onclick="window.print()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2.5 rounded-lg font-medium shadow-sm transition-all flex items-center gap-2">
                <i class="fa-solid fa-print"></i> সরাসরি প্রিন্ট করুন
            </button>
            <button onclick="saveAsZip()" id="zipBtn" class="bg-indigo-500 hover:bg-indigo-600 text-white px-6 py-2.5 rounded-lg font-medium shadow-sm transition-all flex items-center gap-2">
                <i class="fa-solid fa-file-zipper"></i> ছবি হিসেবে সেভ করুন (Zip)
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hidden" id="previewContainer">
            <div class="p-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center no-print">
                <h3 class="font-semibold text-gray-700"><i class="fa-solid fa-table list-alt mr-2"></i>শিট প্রিভিউ</h3>
                <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded font-medium" id="rowCount">0 Rows</span>
            </div>
            <div id="printable-area" class="p-6 overflow-x-auto table-container">
                </div>
        </div>

        <div id="hidden-render-area" class="absolute left-[-9999px] top-0 bg-white p-8 w-[1000px]"></div>
    </div>

    <script>
        let globalSheetData = [];

        function extractSpreadsheetId(url) {
            const regex = /\/d\/([a-zA-Z0-9-_]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        async function loadSheet() {
            const urlInput = document.getElementById('sheetUrl').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const loadBtn = document.getElementById('loadBtn');
            const sheetId = extractSpreadsheetId(urlInput);

            if (!sheetId) {
                errorMsg.classList.remove('hidden');
                errorMsg.innerText = "দয়া করে সঠিক গুগল শিটের লিংক দিন।";
                return;
            }

            errorMsg.classList.add('hidden');
            loadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> লোড হচ্ছে...';
            loadBtn.disabled = true;

            // Google Sheets CSV Export URL
            const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

            Papa.parse(csvUrl, {
                download: true,
                header: false,
                complete: function(results) {
                    globalSheetData = results.data;
                    renderTable(globalSheetData);
                    
                    document.getElementById('actionButtons').classList.remove('hidden');
                    document.getElementById('previewContainer').classList.remove('hidden');
                    document.getElementById('rowCount').innerText = `${globalSheetData.length - 1} Rows Found`;
                    
                    loadBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-down"></i> শিট লোড করুন';
                    loadBtn.disabled = false;
                },
                error: function(err) {
                    errorMsg.classList.remove('hidden');
                    errorMsg.innerText = "শিটটি পড়া যাচ্ছে না। নিশ্চিত করুন শিটটির এক্সেস 'Anyone with the link' করা আছে।";
                    loadBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-down"></i> শিট লোড করুন';
                    loadBtn.disabled = false;
                }
            });
        }

        function generateTableHTML(data, isForImage = false) {
            if (!data || data.length === 0) return "<p>কোনো ডেটা পাওয়া যায়নি।</p>";

            let html = `<table class="w-full text-left border-collapse ${isForImage ? 'text-sm' : 'text-sm md:text-base'}">`;
            
            data.forEach((row, rowIndex) => {
                // Skip completely empty rows
                if(row.every(cell => !cell)) return;

                html += `<tr class="${rowIndex === 0 ? 'bg-gray-100 text-gray-800 font-bold border-b-2 border-gray-300' : 'border-b border-gray-200 hover:bg-gray-50'}">`;
                
                row.forEach(cell => {
                    const cellTag = rowIndex === 0 ? 'th' : 'td';
                    html += `<${cellTag} class="p-3 border-r border-gray-200 last:border-r-0">${cell || ''}</${cellTag}>`;
                });
                html += "</tr>";
            });
            html += "</table>";
            return html;
        }

        function renderTable(data) {
            const container = document.getElementById('printable-area');
            container.innerHTML = generateTableHTML(data);
        }

        async function saveAsZip() {
            if (globalSheetData.length === 0) return;

            const zipBtn = document.getElementById('zipBtn');
            const originalBtnHtml = zipBtn.innerHTML;
            zipBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> জিপ তৈরি হচ্ছে...';
            zipBtn.disabled = true;

            const zip = new JSZip();
            const rowsPerPage = 30; // 30 rows per image page
            const hiddenArea = document.getElementById('hidden-render-area');
            
            const headerRow = globalSheetData[0];
            const dataRows = globalSheetData.slice(1);
            const totalPages = Math.ceil(dataRows.length / rowsPerPage) || 1;

            try {
                for (let i = 0; i < totalPages; i++) {
                    const startIdx = i * rowsPerPage;
                    const pageData = [headerRow, ...dataRows.slice(startIdx, startIdx + rowsPerPage)];
                    
                    hiddenArea.innerHTML = `
                        <div class="bg-white p-6 border-2 border-gray-800 rounded">
                            <h2 class="text-xl font-bold mb-4 text-center">Sheet Data - Page ${i + 1}</h2>
                            ${generateTableHTML(pageData, true)}
                            <div class="text-right text-xs text-gray-500 mt-4">Generated via Smart Sheet Exporter</div>
                        </div>
                    `;

                    const canvas = await html2canvas(hiddenArea, {
                        scale: 2, // High resolution
                        useCORS: true,
                        backgroundColor: "#ffffff"
                    });

                    const imgData = canvas.toDataURL("image/png").split(',')[1];
                    zip.file(`sheet_page_${i + 1}.png`, imgData, {base64: true});
                }

                const content = await zip.generateAsync({type: "blob"});
                saveAs(content, "sheet_images.zip");

            } catch (error) {
                alert("ছবি তৈরি করতে সমস্যা হয়েছে।");
                console.error(error);
            } finally {
                hiddenArea.innerHTML = "";
                zipBtn.innerHTML = originalBtnHtml;
                zipBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
