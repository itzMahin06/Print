<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Sheet Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background: #f3f4f6; }
        
        /* মোবাইল প্রিভিউ এর জন্য টেবিল ছোট করা */
        .compact-table th, .compact-table td {
            font-size: 10px !important; /* একদম ছোট ফন্ট */
            padding: 4px 6px !important;
            line-height: 1.2;
        }

        @media (max-width: 640px) {
            .compact-table { min-width: 100%; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
        }

        /* প্রিন্ট ফরম্যাট */
        @media print {
            .no-print { display: none !important; }
            .compact-table { font-size: 12px !important; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="glass shadow-md sticky top-0 z-50 no-print mb-4">
        <div class="max-w-6xl mx-auto p-4">
            <div class="flex flex-col gap-3">
                <select id="sheetSelector" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 focus:ring-blue-500">
                    <option value="">শিট নির্বাচন করুন</option>
                </select>
                
                <div class="flex gap-2">
                    <button onclick="window.print()" class="flex-1 bg-blue-600 text-white text-sm font-bold py-2 rounded-lg shadow">
                        প্রিন্ট
                    </button>
                    <button id="saveImgBtn" onclick="saveHighResImage()" class="flex-1 bg-emerald-600 text-white text-sm font-bold py-2 rounded-lg shadow">
                        ছবি সেভ করুন
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-2">
        <div id="capture-area" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div id="table-container" class="overflow-x-auto">
                <div class="text-center py-20 text-gray-400 text-sm">
                    কোনো ডাটা নেই। উপরে থেকে শিট সিলেক্ট করুন।
                </div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            sheets: [
                { name: "ইফতার ২০২৬ লিস্ট", id: "1nai-1HlS01yqoU4MvaQ71H6rgznhNe2cIyXeoLVrRFU" }
            ]
        };

        const selector = document.getElementById('sheetSelector');
        const container = document.getElementById('table-container');

        // লোড ড্রপডাউন
        config.sheets.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name;
            selector.appendChild(opt);
        });

        selector.addEventListener('change', (e) => {
            if (e.target.value) fetchSheet(e.target.value);
        });

        async function fetchSheet(id) {
            container.innerHTML = `<div class="p-10 text-center text-xs">লোড হচ্ছে...</div>`;
            const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv`;
            
            try {
                const res = await fetch(url);
                const csv = await res.text();
                render(csv);
            } catch (err) {
                container.innerHTML = `<div class="p-10 text-red-500 text-xs">ব্যর্থ হয়েছে।</div>`;
            }
        }

        function render(csv) {
            const rows = csv.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '')));
            let h = `<table class="compact-table min-w-full divide-y divide-gray-200 border-collapse">
                        <thead class="bg-gray-100"><tr>`;
            
            rows[0].forEach(col => h += `<th class="border border-gray-300 font-bold text-gray-700">${col}</th>`);
            h += `</tr></thead><tbody class="bg-white">`;

            for (let i = 1; i < rows.length; i++) {
                if (rows[i].length <= 1) continue;
                h += `<tr class="border-b">`;
                rows[i].forEach(cell => h += `<td class="border border-gray-200 text-gray-600">${cell}</td>`);
                h += `</tr>`;
            }
            container.innerHTML = h + `</tbody></table>`;
        }

        // উচ্চমানের ছবি সেভ করার জন্য উন্নত মেথড
        async function saveHighResImage() {
            const btn = document.getElementById('saveImgBtn');
            const target = document.getElementById('capture-area');
            
            if (selector.value === "") return alert("আগে শিট সিলেক্ট করুন");

            btn.innerText = "প্রসেসিং...";
            btn.disabled = true;

            try {
                // High resolution scaling (3x for ultra sharp)
                const canvas = await html2canvas(target, {
                    scale: 3, 
                    useCORS: true,
                    logging: false,
                    backgroundColor: "#ffffff",
                    windowWidth: target.scrollWidth,
                    windowHeight: target.scrollHeight
                });

                // Convert to Blob for better performance and quality
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `Table_Export_${Date.now()}.png`;
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                }, 'image/png', 1.0);

            } catch (e) {
                alert("ছবি তৈরি করা সম্ভব হয়নি।");
            } finally {
                btn.innerText = "ছবি সেভ করুন";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
